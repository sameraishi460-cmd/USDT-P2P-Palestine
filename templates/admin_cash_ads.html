<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سوق المقابلات الشخصية</title>


<style>

body{

margin:0;
padding:20px;
background:#070d18;
color:white;
font-family:tahoma;

}


.box{

max-width:1100px;
margin:auto;
background:#111827;
padding:25px;
border-radius:25px;

}


h1{

text-align:center;
color:#22c55e;

}



.top{

text-align:center;
margin-bottom:25px;

}


.btn{

display:inline-block;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:12px;
margin:5px;

}


.green{

background:#16a34a;

}



.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}



.card{

background:#1e293b;
padding:20px;
border-radius:20px;

}



.title{

font-size:20px;
color:#22c55e;

}



.buy{

display:block;
background:#16a34a;
padding:12px;
text-align:center;
border-radius:12px;
color:white;
text-decoration:none;
margin-top:15px;

}



.info{

background:#334155;
padding:10px;
border-radius:10px;
margin-top:10px;

}



</style>


</head>



<body>


<div class="box">



<h1>

🤝 سوق المقابلات الشخصية

</h1>




<div class="top">


<a class="btn green" href="/create_cash_ad">

📍 نشر إعلان مقابلة شخصية

</a>



<a class="btn" href="/">

🏠 الرئيسية

</a>



</div>





<div class="cards">


{% for ad in ads %}



<div class="card">



<div class="title">

👤 {{ad.user}}

</div>




<div class="info">

💰 الكمية:

{{ad.amount}} USDT

</div>



<div class="info">

💵 السعر:

{{ad.price}}

</div>



<div class="info">

📍 المدينة:

{{ad.city}}

</div>



<div class="info">

📌 مكان اللقاء:

{{ad.location}}

</div>



<a class="buy" href="/cash_ad/{{ad.id}}">

عرض التفاصيل

</a>



</div>



{% else %}



<div class="card">

لا توجد إعلانات مقابلات شخصية حالياً

</div>



{% endfor %}



</div>



</div>


</body>


</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>بحث الأدمن</title>
<link rel="stylesheet" href="/static/style.css">
</head>


<body>

<h1>
نتائج البحث
</h1>


{% for t in trades %}

<div class="box">

<p>
رقم الصفقة:
{{ t.id }}
</p>


<p>
المشتري:
{{ t.buyer }}
</p>


<p>
البائع:
{{ t.seller }}
</p>


<p>
الحالة:
{{ t.status }}
</p>


</div>


{% else %}

<p>
لا توجد نتائج
</p>


{% endfor %}


</body>

</html>

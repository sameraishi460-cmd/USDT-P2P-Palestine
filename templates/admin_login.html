<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>دخول الأدمن</title>


<style>

body{
    font-family:Arial;
    background:#111827;
}


.box{

    background:white;
    width:90%;
    max-width:450px;
    margin:50px auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px #000;

}


h2{

    text-align:center;
    color:#111827;

}



input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;

}



button{

    width:100%;
    padding:13px;
    background:#2563eb;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;

}



a{

    display:block;
    text-align:center;
    margin-top:15px;

}


</style>


</head>


<body>


<div class="box">


<h2>
🔐 لوحة تحكم الأدمن
</h2>



<form method="POST">


<input

name="username"

placeholder="اسم المستخدم"

required

>



<input

type="password"

name="password"

placeholder="كلمة المرور"

required

>



<button>

دخول

</button>



</form>



<a href="/">

العودة للرئيسية

</a>



</div>


</body>

</html>

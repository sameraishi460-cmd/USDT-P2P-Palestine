<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تعديل الملف الشخصي</title>

<style>

body{
background:#050b16;
color:white;
font-family:tahoma;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
}

h2{
text-align:center;
color:#22c55e;
}


input,select{

width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:0;
font-size:16px;

}


button{

width:100%;
padding:15px;
background:#16a34a;
color:white;
border:0;
border-radius:15px;
font-size:18px;

}


.back{

display:block;
margin-top:15px;
background:#475569;
padding:15px;
text-align:center;
border-radius:15px;
color:white;
text-decoration:none;

}

</style>

</head>


<body>


<div class="container">


<div class="card">


<h2>
💳 بيانات الدفع
</h2>


<form method="POST">


<label>
📱 رقم الجوال
</label>

<input 
type="text"
name="phone"
value="{{user.phone or ''}}"
placeholder="مثال: 059xxxxxxx"
required
>



<label>
🏦 اسم البنك
</label>

<input 
type="text"
name="bank"
value="{{user.bank or ''}}"
placeholder="مثال: بنك فلسطين"
required
>



<label>
💳 رقم الحساب / IBAN
</label>


<input 
type="text"
name="iban"
value="{{user.iban or ''}}"
placeholder="رقم الحساب أو IBAN"
required
>




<label>
💵 طريقة الدفع
</label>


<select name="payment_method">


<option value="تحويل بنكي">
تحويل بنكي
</option>


<option value="محفظة إلكترونية">
محفظة إلكترونية
</option>


<option value="نقدي">
نقدي
</option>


</select>



<button>
💾 حفظ البيانات
</button>


</form>



<a class="back" href="/profile">
⬅️ رجوع
</a>



</div>


</div>


</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<title>تعديل البيانات</title>

<style>

body{
    font-family:tahoma;
    background:#0b1220;
    color:white;
}

.box{
    background:#1e293b;
    width:90%;
    max-width:450px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:0;
}

button{
    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:16px;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#22c55e;
}

</style>

</head>

<body>

<div class="box">

<h2>✏️ تعديل بيانات الحساب</h2>


<form method="POST">


<label>رقم الهاتف</label>

<input 
name="phone"
value="{{user.phone}}"
placeholder="رقم الهاتف"
>


<label>البنك</label>

<input 
name="bank"
value="{{user.bank}}"
placeholder="اسم البنك"
>


<label>محفظة USDT</label>

<input 
name="wallet"
value="{{user.wallet}}"
placeholder="عنوان المحفظة"
>


<button>
💾 حفظ التعديلات
</button>


</form>


<a href="/profile">
العودة للملف الشخصي
</a>


</div>

</body>

</html>

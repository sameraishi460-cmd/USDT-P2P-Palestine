<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تعديل الحساب</title>

<style>

body{
background:#050b16;
color:white;
font-family:tahoma;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
}

h2{
color:#22c55e;
text-align:center;
}

input,select{
width:100%;
padding:15px;
margin:8px 0;
border-radius:12px;
border:0;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:0;
border-radius:15px;
font-size:18px;
}

.back{
display:block;
text-align:center;
margin-top:15px;
background:#475569;
padding:15px;
border-radius:15px;
color:white;
text-decoration:none;
}

.section{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:20px;
}

</style>

</head>


<body>


<div class="container">


<div class="card">


<h2>
⚙️ تعديل الحساب
</h2>


<form method="POST">


<div class="section">

<h3>
📱 معلومات التواصل
</h3>


<input 
name="phone"
placeholder="رقم الجوال"
value="{{user.phone or ''}}"
>


</div>



<div class="section">

<h3>
💳 بيانات الدفع (تظهر للمشتري)
</h3>


<input 
name="bank_name"
placeholder="اسم البنك"
value="{{user.bank_name or ''}}"
>


<input 
name="account_number"
placeholder="رقم الحساب أو IBAN"
value="{{user.account_number or ''}}"
>


<input 
name="payment_phone"
placeholder="رقم الجوال للتحويل"
value="{{user.payment_phone or ''}}"
>


</div>




<div class="section">

<h3>
🪙 محفظة العملات
</h3>


<input 
name="wallet"
placeholder="عنوان محفظتك"
value="{{user.wallet or ''}}"
>


</div>



<button>
💾 حفظ البيانات
</button>


</form>


<a class="back" href="/profile">
⬅️ رجوع
</a>


</div>


</div>


</body>

</html>

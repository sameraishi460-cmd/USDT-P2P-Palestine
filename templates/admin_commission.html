<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تعديل العمولة</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:tahoma;
}

.box{

    width:90%;
    max-width:400px;
    margin:50px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;

}


input,button{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:0;

}


button{

    background:#16a34a;
    color:white;
    font-size:16px;

}


</style>

</head>


<body>


<div class="box">


<h2>
⚙️ تعديل العمولة
</h2>


<form method="POST" action="/admin_commission">


<label>
عمولة صفقات USDT %
</label>


<input 
type="number"
step="0.1"
name="trade_fee"
value="{{commission.trade_fee}}"
>


<label>
عمولة إعلان المقابلة الشخصية USDT
</label>


<input 
type="number"
step="0.1"
name="cash_fee"
value="{{commission.cash_fee}}"
>


<button>
💾 حفظ التعديل
</button>


</form>


</div>


</body>

</html>

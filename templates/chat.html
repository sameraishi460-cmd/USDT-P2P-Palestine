<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>المحادثة</title>
<link rel="stylesheet" href="/static/style.css">
</head>


<body>

<h1>
المحادثة مع {{ target }}
</h1>


{% for m in messages %}

<div class="box">

<b>
{{ m.sender }}
</b>

<p>
{{ m.text }}
</p>

</div>


{% endfor %}



<form method="POST" action="/send_message">

<input type="hidden" name="receiver" value="{{ target }}">


<input 
type="text" 
name="text"
placeholder="اكتب رسالة">


<button>
إرسال
</button>


</form>



</body>

</html>

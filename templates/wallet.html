<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محفظتي - USDT P2P Palestine</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:tahoma,Arial;
background:#050b16;
color:white;
}


.container{
max-width:500px;
margin:auto;
padding:20px;
}



.header{
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}



.logo{
font-size:25px;
font-weight:bold;
color:#22c55e;
}



.card{

background:#111827;
border:1px solid #263244;
border-radius:22px;
padding:20px;
margin-bottom:20px;

}



.balance{

background:linear-gradient(135deg,#16a34a,#15803d);
padding:30px;
border-radius:20px;
text-align:center;

}



.balance h1{

font-size:42px;
margin:15px 0;

}



.box{

background:#1e293b;
padding:18px;
border-radius:15px;
margin-top:15px;
text-align:center;

}



.label{

color:#cbd5e1;
font-size:15px;

}



.value{

font-size:25px;
font-weight:bold;
margin-top:8px;

}



.buttons{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}



.btn{

padding:15px;
border-radius:15px;
text-align:center;
text-decoration:none;
color:white;

}



.deposit{

background:#16a34a;

}



.withdraw{

background:#2563eb;

}



.back{

display:block;
background:#475569;
padding:15px;
border-radius:15px;
text-align:center;
text-decoration:none;
color:white;

}



.status{

color:#22c55e;
font-weight:bold;

}


</style>


</head>



<body>


<div class="container">



<div class="header">

<div class="logo">
🇵🇸 USDT P2P Palestine
</div>

<h3>
💰 محفظتي
</h3>

</div>




<div class="card">


<div class="balance">

<p>
الرصيد المتاح
</p>


<h1>
{{ wallet.balance or 0 }}
</h1>


<span>
USDT
</span>


</div>




<div class="box">

<div class="label">
🔒 الرصيد المحجوز
</div>


<div class="value">

{{ wallet.locked or 0 }} USDT

</div>


</div>





<div class="box">

<div class="label">
📊 إجمالي الرصيد
</div>


<div class="value">

{{ (wallet.balance or 0) + (wallet.locked or 0) }} USDT

</div>


</div>





<div class="box">

<div class="label">
حالة المحفظة
</div>


<div class="status">

🟢 نشطة

</div>


</div>



</div>







<div class="card">


<div class="buttons">


<a href="#" class="btn deposit">

➕ إيداع USDT

</a>


<a href="#" class="btn withdraw">

📤 سحب USDT

</a>


</div>


</div>





<a href="/" class="back">

⬅️ رجوع للرئيسية

</a>



</div>



</body>

</html>

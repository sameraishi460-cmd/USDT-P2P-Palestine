<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محفظتي - USDT P2P Palestine</title>


<style>

body{
margin:0;
font-family:tahoma,Arial;
background:#050b16;
color:white;
}


.container{
max-width:500px;
margin:auto;
padding:20px;
}


.header{
background:#111827;
padding:18px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}


.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}



.card{

background:#111827;
border:1px solid #263244;
border-radius:22px;
padding:25px;
margin-bottom:20px;
text-align:center;

}



.main-balance{

background:linear-gradient(135deg,#16a34a,#15803d);
border-radius:20px;
padding:25px;
}


.main-balance h1{
font-size:40px;
margin:10px;
}



.box{

background:#1e293b;
padding:18px;
border-radius:15px;
margin-top:15px;

}



.title{

color:#cbd5e1;
font-size:15px;

}



.value{

font-size:25px;
font-weight:bold;
margin-top:8px;

}



.buttons{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}



.btn{

padding:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-size:16px;
display:block;

}


.deposit{

background:#16a34a;

}


.withdraw{

background:#2563eb;

}


.back{

display:block;
background:#475569;
padding:15px;
border-radius:15px;
text-align:center;
text-decoration:none;
color:white;
margin-top:20px;

}


.status{

color:#22c55e;
font-weight:bold;

}



</style>


</head>



<body>


<div class="container">



<div class="header">

<div class="logo">
🇵🇸 USDT P2P Palestine
</div>

<p>
💰 محفظتي
</p>

</div>




<div class="card">


<div class="main-balance">

<div>
الرصيد المتاح
</div>


<h1>
{{ wallet.balance }}
</h1>


<span>
USDT
</span>


</div>



<div class="box">

<div class="title">
🔒 الرصيد المحجوز
</div>


<div class="value">
{{ wallet.locked }} USDT
</div>


</div>




<div class="box">

<div class="title">
📊 إجمالي الرصيد
</div>


<div class="value">

{{ wallet.balance + wallet.locked }}

USDT

</div>


</div>



<div class="box">

<div class="title">
حالة المحفظة
</div>


<div class="status">
🟢 نشطة
</div>


</div>



</div>





<div class="card">


<div class="buttons">


<a class="btn deposit" href="#">
➕ إيداع USDT
</a>


<a class="btn withdraw" href="#">
📤 سحب USDT
</a>


</div>


</div>




<a class="back" href="/">
⬅️ رجوع للرئيسية
</a>




</div>


</body>

</html>

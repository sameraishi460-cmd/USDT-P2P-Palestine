<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إنشاء حساب</title>


<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}


.box{

    background:white;
    width:90%;
    max-width:450px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px #ccc;

}


h2{
    text-align:center;
}


input{

    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;

}



button{

    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:16px;

}


a{

    display:block;
    text-align:center;
    margin-top:15px;

}


</style>


</head>


<body>


<div class="box">


<h2>
👤 إنشاء حساب جديد
</h2>



<form method="POST">


<input 
name="username"
placeholder="اسم المستخدم"
required
>


<input

type="password"

name="password"

placeholder="كلمة المرور"

required

>



<input

name="phone"

placeholder="رقم الهاتف"

required

>



<input

name="bank"

placeholder="البنك أو طريقة الدفع"

required

>



<input

name="wallet"

placeholder="عنوان محفظة USDT"

required

>



<button>

إنشاء الحساب

</button>



</form>



<a href="/login">

لدي حساب - تسجيل دخول

</a>



</div>


</body>

</html>

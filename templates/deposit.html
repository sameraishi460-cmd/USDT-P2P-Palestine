<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إيداع USDT</title>

<style>

body{
margin:0;
font-family:tahoma,Arial;
background:#050b16;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:20px;
border:1px solid #263244;
margin-top:20px;
}


h2{
text-align:center;
color:#22c55e;
}


.wallet{

background:#1e293b;
padding:15px;
border-radius:15px;
word-break:break-all;
text-align:center;
}


input{

width:100%;
padding:15px;
border-radius:12px;
border:none;
margin-top:15px;
font-size:18px;

}


button{

width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:15px;
background:#16a34a;
color:white;
font-size:18px;

}


.back{

display:block;
margin-top:15px;
background:#475569;
padding:15px;
border-radius:15px;
text-align:center;
text-decoration:none;
color:white;

}


.copy{

background:#2563eb;
margin-top:10px;

}

</style>

</head>


<body>


<div class="container">


<div class="card">


<h2>
➕ إيداع USDT
</h2>



<p>
أرسل USDT إلى عنوان المنصة:
</p>



<div class="wallet" id="wallet">

{{ wallet_address }}

</div>


<button class="copy" onclick="copyWallet()">
📋 نسخ العنوان
</button>




<form method="POST">


<input 
type="number"
step="0.01"
name="amount"
placeholder="كمية USDT"
required
>



<button>
إرسال طلب الإيداع
</button>


</form>



<a class="back" href="/wallet">
⬅️ رجوع للمحفظة
</a>


</div>


</div>




<script>

function copyWallet(){

let text=document.getElementById("wallet").innerText;

navigator.clipboard.writeText(text);

alert("تم نسخ عنوان المحفظة ✅");

}

</script>



</body>

</html>

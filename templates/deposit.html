<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إيداع USDT - USDT P2P Palestine</title>


<style>

*{
box-sizing:border-box;
}


body{
margin:0;
font-family:tahoma,Arial;
background:#050b16;
color:white;
}



.container{

max-width:500px;
margin:auto;
padding:20px;

}



.card{

background:#111827;
padding:25px;
border-radius:22px;
border:1px solid #263244;
margin-top:20px;

}



.logo{

text-align:center;
font-size:24px;
font-weight:bold;
color:#22c55e;
margin-bottom:20px;

}



h2{

text-align:center;
color:#22c55e;

}



.info{

background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:15px;
line-height:1.8;

}



.wallet{

background:#0f172a;
padding:18px;
border-radius:15px;
word-break:break-all;
text-align:center;
border:1px solid #22c55e;
margin-top:15px;
font-size:15px;

}



button{

width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:15px;
color:white;
font-size:18px;
cursor:pointer;

}



.copy{

background:#2563eb;

}



.submit{

background:#16a34a;

}



input{

width:100%;
padding:15px;
border-radius:12px;
border:none;
margin-top:20px;
font-size:18px;

}



.warning{

background:#7c2d12;
padding:15px;
border-radius:15px;
margin-top:20px;
font-size:14px;

}



.back{

display:block;
margin-top:20px;
background:#475569;
padding:15px;
border-radius:15px;
text-align:center;
text-decoration:none;
color:white;

}



.small{

color:#94a3b8;
font-size:14px;
text-align:center;
margin-top:15px;

}


</style>


</head>



<body>



<div class="container">



<div class="card">



<div class="logo">
🇵🇸 USDT P2P Palestine
</div>



<h2>
➕ إيداع USDT
</h2>



<div class="info">

💰 قم بتحويل USDT إلى محفظة المنصة

<br>

بعد التحويل أرسل طلب الإيداع، وسيتم مراجعته من الإدارة.

</div>





<p>
📌 عنوان محفظة المنصة:
</p>



<div class="wallet" id="wallet">

{{ wallet_address }}

</div>



<button class="copy" onclick="copyWallet()">

📋 نسخ عنوان المحفظة

</button>





<form method="POST">



<input 
type="number"
step="0.01"
name="amount"
placeholder="أدخل كمية USDT"
required
>



<button class="submit">

✅ إرسال طلب الإيداع

</button>



</form>




<div class="warning">

⚠️ تأكد من إرسال USDT على الشبكة الصحيحة قبل التحويل.

</div>



<div class="small">

بعد الإرسال سيتم إضافة الرصيد بعد موافقة الإدارة.

</div>




<a class="back" href="/wallet">

⬅️ رجوع للمحفظة

</a>



</div>



</div>






<script>


function copyWallet(){

let text=document.getElementById("wallet").innerText;


navigator.clipboard.writeText(text);


alert("تم نسخ عنوان المحفظة ✅");


}


</script>



</body>

</html>

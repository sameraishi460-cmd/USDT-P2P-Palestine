<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>الملف الشخصي</title>


<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}


.box{

    background:white;
    width:90%;
    max-width:500px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px #ccc;

}


h2{

    text-align:center;

}


.item{

    background:#eee;
    padding:12px;
    margin:10px 0;
    border-radius:10px;

}


button{

    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:16px;

}


a{

    text-decoration:none;

}

</style>


</head>


<body>


<div class="box">


<h2>
👤 الملف الشخصي
</h2>



<div class="item">

اسم المستخدم:

<b>
{{user.username}}
</b>

</div>




<div class="item">

رقم الهاتف:

<br>

{{user.phone}}

</div>




<div class="item">

البنك / طريقة الدفع:

<br>

{{user.bank}}

</div>




<div class="item">

محفظة USDT:

<br>

{{user.wallet}}

</div>



<br>


<a href="/create_ad">

<button>

➕ إنشاء إعلان بيع USDT

</button>

</a>



<br><br>


<a href="/">

<button>

العودة للرئيسية

</button>

</a>



</div>


</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تفاصيل المقابلة الشخصية</title>

<style>

body{
    background:#0b1220;
    color:white;
    font-family:tahoma;
}

.box{
    max-width:500px;
    margin:40px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

h2{
    color:#22c55e;
    text-align:center;
}

.item{
    background:#334155;
    padding:12px;
    border-radius:10px;
    margin:10px 0;
}

.btn{
    display:block;
    background:#16a34a;
    color:white;
    text-align:center;
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    margin-top:20px;
}

.back{
    background:#2563eb;
}

</style>

</head>


<body>


<div class="box">


<h2>
🤝 مقابلة شخصية
</h2>


<div class="item">
👤 البائع:
<b>{{ad.user}}</b>
</div>


<div class="item">
💰 الكمية:
<b>{{ad.amount}} USDT</b>
</div>


<div class="item">
💵 السعر:
<b>{{ad.price}}</b>
</div>


<div class="item">
📍 المدينة:
<b>{{ad.city}}</b>
</div>


<div class="item">
📌 مكان اللقاء:
<b>{{ad.location}}</b>
</div>


<div class="item">
📝 ملاحظات:
<b>{{ad.notes}}</b>
</div>



<a class="btn" href="/cash_buy/{{ad.id}}">
طلب مقابلة
</a>


<a class="btn back" href="/cash_market">
رجوع للإعلانات
</a>


</div>


</body>

</html>

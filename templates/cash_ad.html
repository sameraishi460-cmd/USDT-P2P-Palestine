<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تفاصيل المقابلة الشخصية</title>

<style>

body{
    background:#0b1220;
    color:white;
    font-family:tahoma;
    padding:20px;
}

.box{
    max-width:500px;
    margin:30px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}


h2{
    text-align:center;
    color:#22c55e;
}


.item{
    background:#334155;
    padding:12px;
    border-radius:10px;
    margin:10px 0;
}


.btn{

    display:block;
    text-align:center;
    color:white;
    text-decoration:none;
    padding:13px;
    border-radius:10px;
    margin-top:15px;

}


.buy{
    background:#16a34a;
}


.back{
    background:#2563eb;
}


.home{
    background:#475569;
}


.status{
    color:#22c55e;
    text-align:center;
    font-size:18px;
}

</style>

</head>


<body>


<div class="box">


<h2>
🤝 تفاصيل المقابلة
</h2>



<div class="status">

متاح للطلب ✅

</div>



<div class="item">

👤 البائع:

<b>
{{ad.user}}
</b>

</div>



<div class="item">

💰 الكمية:

<b>
{{ad.amount}} USDT
</b>

</div>



<div class="item">

💵 السعر:

<b>
{{ad.price}}
</b>

</div>



<div class="item">

📍 المدينة:

<b>
{{ad.city}}
</b>

</div>



<div class="item">

📌 مكان اللقاء:

<b>
{{ad.location}}
</b>

</div>



<div class="item">

📝 ملاحظات:

<b>
{{ad.notes}}
</b>

</div>



<a class="btn buy" href="/cash_buy/{{ad.id}}">

🤝 طلب مقابلة

</a>



<a class="btn back" href="/cash_market">

⬅️ رجوع للإعلانات

</a>



<a class="btn home" href="/">

🏠 الصفحة الرئيسية

</a>



</div>


</body>

</html>

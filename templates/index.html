<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>USDT P2P Palestine</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<div class="logo">
🇵🇸 USDT P2P Palestine
</div>


<div class="card">

{% if user %}

<p>
👤 مرحبا {{user}}
</p>

<a href="/logout">
<button>
تسجيل خروج
</button>
</a>

{% else %}

<a href="/register">
<button>
إنشاء حساب
</button>
</a>

<br><br>

<a href="/login">
<button>
تسجيل دخول
</button>
</a>

{% endif %}

</div>



<div class="card">

<a href="/create_ad">
<button>
+ إنشاء إعلان بيع USDT
</button>
</a>

</div>



<h2>
الإعلانات
</h2>



{% for ad in ads %}

<div class="card">

<h3>
🟢 إعلان بيع
</h3>

<p>
البائع: {{ad.user}}
</p>

<p>
الكمية: {{ad.amount}} USDT
</p>

<p class="price">
{{ad.price}} شيكل
</p>

<p>
الدفع: {{ad.payment}}
</p>


<a href="/buy/{{ad.id}}">
<button>
شراء
</button>
</a>


</div>


{% else %}

<div class="card">
لا يوجد إعلانات
</div>

{% endfor %}


</div>

</body>
</html>

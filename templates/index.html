<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>USDT Exchange</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:20px;
}


.container{
    max-width:700px;
    margin:auto;
}


.box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}


button{
    background:#008000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}


.admin{
    background:#333;
}


a{
    text-decoration:none;
}


.ad{
    border:1px solid #ddd;
    padding:15px;
    margin-top:10px;
    border-radius:8px;
}


</style>

</head>


<body>


<div class="container">



<div class="box">


<h2>
منصة تداول USDT
</h2>



{% if user %}

<p>
مرحباً {{user}}
</p>


<a href="/profile">

<button>
الملف الشخصي
</button>

</a>


<a href="/create_ad">

<button>
إنشاء إعلان بيع
</button>

</a>


<a href="/logout">

<button style="background:red">
تسجيل خروج
</button>

</a>


{% else %}


<a href="/login">

<button>
تسجيل دخول
</button>

</a>



<a href="/register">

<button>
إنشاء حساب
</button>

</a>


{% endif %}



<br><br>


<a href="/admin_login">

<button class="admin">
دخول الأدمن
</button>

</a>


</div>





<div class="box">


<h3>
الإعلانات المتاحة
</h3>



{% if ads %}


{% for ad in ads %}


<div class="ad">


<p>
البائع:
{{ad.user}}
</p>


<p>
الكمية:
{{ad.amount}} USDT
</p>


<p>
السعر:
{{ad.price}}
</p>


<p>
طريقة الدفع:
{{ad.payment}}
</p>


<a href="/buy/{{ad.id}}">

<button>
شراء
</button>

</a>


</div>


{% endfor %}



{% else %}


<p>
لا توجد إعلانات حالياً
</p>


{% endif %}



</div>



</div>


</body>

</html>

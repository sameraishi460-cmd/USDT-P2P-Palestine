<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>USDT P2P Palestine</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

button{
background:#0084ff;
color:white;
border:0;
padding:10px;
border-radius:8px;
}

a{
text-decoration:none;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

</style>

</head>

<body>


<div class="top">

<h2>🇵🇸 USDT P2P Palestine</h2>

<a href="/create_ad">
<button>
إضافة إعلان
</button>
</a>

</div>



{% if ads %}


{% for ad in ads %}


<div class="box">


<h3>
{{ad.type}}
</h3>


<p>
👤 {{ad.user}}
</p>


<p>
💰 {{ad.amount}} USDT
</p>


<p>
💵 {{ad.price}} شيكل
</p>


<p>
💳 {{ad.payment}}
</p>


<a href="/buy/{{ad.id}}">

<button>
شراء
</button>

</a>


</div>


{% endfor %}



{% else %}


<div class="box">

<h3>
لا يوجد إعلانات
</h3>

</div>


{% endif %}



</body>
</html>

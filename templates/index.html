<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<title>USDT Exchange</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}


.container{
    max-width:800px;
    margin:auto;
}


.header{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
}


button{
    padding:10px 18px;
    border:0;
    border-radius:8px;
    background:#008000;
    color:white;
    cursor:pointer;
}


.ads{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:12px;
}


.ad{
    border:1px solid #ddd;
    padding:15px;
    border-radius:8px;
    margin-bottom:10px;
}


.admin-btn{

position:fixed;
left:15px;
bottom:15px;

background:#333;
color:white;

padding:7px 12px;

font-size:12px;

border-radius:20px;

}


a{
text-decoration:none;
}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h2>
منصة USDT
</h2>


{% if user %}

<p>
أهلاً {{user}}
</p>


<a href="/profile">
<button>
ملفي
</button>
</a>


<a href="/create_ad">
<button>
بيع USDT
</button>
</a>


<a href="/logout">
<button style="background:red">
خروج
</button>
</a>


{% else %}


<a href="/login">
<button>
دخول
</button>
</a>


<a href="/register">
<button>
إنشاء حساب
</button>
</a>


{% endif %}


</div>




<div class="ads">


<h3>
الإعلانات المتاحة
</h3>



{% if ads %}


{% for ad in ads %}


<div class="ad">


<p>
البائع: {{ad.user}}
</p>


<p>
الكمية:
{{ad.amount}} USDT
</p>


<p>
السعر:
{{ad.price}}
</p>


<p>
الدفع:
{{ad.payment}}
</p>


<a href="/buy/{{ad.id}}">

<button>
شراء
</button>

</a>


</div>


{% endfor %}


{% else %}


<p>
لا توجد إعلانات حالياً
</p>


{% endif %}



</div>



</div>




<a class="admin-btn" href="/admin_login">

Admin

</a>


</body>

</html>

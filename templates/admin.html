<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>Admin</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

</style>

</head>


<body>


<h2>
🇵🇸 لوحة الإدارة
</h2>



{% for trade in trades %}


<div class="box">


<h3>
صفقة رقم {{trade.id}}
</h3>


<p>
المشتري:
{{trade.buyer}}
</p>


<p>
البائع:
{{trade.seller}}
</p>


<p>
الكمية:
{{trade.amount}} USDT
</p>


<p>
السعر:
{{trade.price}} شيكل
</p>


<p>
الحالة:
{{trade.status}}
</p>


{% if trade.proof %}

<p>
إثبات الدفع:
{{trade.proof}}
</p>

{% endif %}


</div>


{% endfor %}



</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>لوحة الأدمن</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}


.box{

background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;

}


button{

background:#008000;
color:white;
border:none;
padding:10px;
border-radius:5px;

}


a{

text-decoration:none;

}

</style>

</head>


<body>


<h2>
لوحة تحكم الأدمن
</h2>



{% for t in trades %}


<div class="box">


<h3>
صفقة رقم {{t.id}}
</h3>


<p>
البائع:
{{t.seller}}
</p>


<p>
المشتري:
{{t.buyer}}
</p>


<p>
الكمية:
{{t.amount}} USDT
</p>


<p>
السعر:
{{t.price}}
</p>


<p>
الحالة:
{{t.status}}
</p>


<p>
حالة الضمان:
{{t.escrow_status}}
</p>


{% if t.proof %}

<p>
إثبات الدفع:
</p>

<img 
src="/uploads/{{t.proof}}"
width="250"
>


{% endif %}



<br><br>


<a href="/escrow_confirm/{{t.id}}">

<button>
تم استلام USDT من البائع
</button>

</a>



<br><br>


<a href="/cancel_trade/{{t.id}}">

<button style="background:red">

إلغاء الصفقة

</button>

</a>



</div>


{% endfor %}



</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>دفع إعلان مقابلة شخصية</title>


<style>

body{
    font-family:tahoma;
    background:#0b1220;
    color:white;
}


.box{

    background:#1e293b;
    width:90%;
    max-width:500px;
    margin:50px auto;
    padding:25px;
    border-radius:20px;
    text-align:center;

}


h2{
    margin-bottom:20px;
}


.info{

    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;

}


.wallet{

    background:#020617;
    padding:15px;
    border-radius:10px;
    word-break:break-all;
    color:#22c55e;
    font-size:14px;

}


button{

    background:#16a34a;
    color:white;
    border:0;
    padding:12px;
    border-radius:10px;
    width:100%;
    font-size:16px;
    margin-top:10px;

}


.copy{

    background:#2563eb;

}


.back{

    display:block;
    margin-top:15px;
    color:white;

}


#copy_msg{

    color:#22c55e;
    margin-top:10px;

}


</style>


</head>



<body>


<div class="box">


<h2>
💵 دفع إعلان مقابلة شخصية
</h2>



<div class="info">

مدة الإعلان:

<br>

{{days}} يوم

<br><br>

رسوم الإعلان:

<h2>
{{fee}} USDT
</h2>


</div>




<p>
أرسل المبلغ إلى محفظة المنصة:
</p>



<div class="wallet" id="wallet">

{{wallet}}

</div>



<button class="copy" onclick="copyWallet()">

📋 نسخ عنوان المحفظة

</button>



<p id="copy_msg"></p>



<form method="POST" action="/cash_payment_sent">


<input type="hidden" name="amount" value="{{amount}}">

<input type="hidden" name="price" value="{{price}}">

<input type="hidden" name="city" value="{{city}}">

<input type="hidden" name="location" value="{{location}}">

<input type="hidden" name="notes" value="{{notes}}">

<input type="hidden" name="fee" value="{{fee}}">

<input type="hidden" name="days" value="{{days}}">


<button>

✅ أرسلت الدفع

</button>


</form>



<a class="back" href="/">

العودة للرئيسية

</a>



</div>



<script>


function copyWallet(){

let wallet = document.getElementById("wallet").innerText;


navigator.clipboard.writeText(wallet);


document.getElementById("copy_msg").innerHTML =
"✅ تم نسخ عنوان المحفظة";


}


</script>



</body>


</html>

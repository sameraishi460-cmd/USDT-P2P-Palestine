<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دفع إعلان مقابلة شخصية</title>


<style>

body{

background:#070d18;
color:white;
font-family:tahoma;
padding:20px;

}



.box{

max-width:500px;
margin:auto;
background:#111827;
padding:25px;
border-radius:25px;

}



h2{

text-align:center;
color:#22c55e;

}



.info{

background:#1e293b;
padding:15px;
border-radius:15px;
margin:15px 0;

}



.wallet{

background:#334155;
padding:12px;
border-radius:12px;
word-break:break-all;

}



button{

width:100%;
padding:14px;
border:0;
border-radius:12px;
background:#16a34a;
color:white;
font-size:17px;
margin-top:15px;

}



.copy{

background:#2563eb;

}



.back{

display:block;
text-align:center;
margin-top:15px;
background:#475569;
padding:12px;
border-radius:12px;
color:white;
text-decoration:none;

}


</style>


</head>


<body>


<div class="box">



<h2>

💳 دفع إعلان مقابلة شخصية

</h2>




<div class="info">

رسوم الإعلان:

<br><br>

<b>

{{fee}} USDT

</b>

</div>





<div class="info">

أرسل الدفع إلى محفظة المنصة:

<br><br>


<div class="wallet" id="wallet">


{{wallet}}


</div>



<button class="copy" onclick="copyWallet()">

📋 نسخ عنوان المحفظة

</button>



</div>







<form method="POST" action="/cash_payment_sent">



<input type="hidden" name="amount" value="{{amount}}">

<input type="hidden" name="price" value="{{price}}">

<input type="hidden" name="city" value="{{city}}">

<input type="hidden" name="location" value="{{location}}">

<input type="hidden" name="notes" value="{{notes}}">

<input type="hidden" name="plan" value="{{plan}}">





<button>

✅ تم إرسال الدفع

</button>



</form>




<a class="back" href="/">

⬅️ الرجوع للرئيسية

</a>




</div>





<script>


function copyWallet(){


let text=document.getElementById("wallet").innerText;


navigator.clipboard.writeText(text);


alert("تم نسخ عنوان المحفظة ✅");


}


</script>



</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
إنشاء إعلان USDT
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<div class="container">


<div class="header">

<h2>
➕ إنشاء إعلان بيع USDT
</h2>

</div>



<div class="card">


<form method="POST">


<label>
كمية USDT
</label>

<input 
type="number"
step="0.01"
name="amount"
placeholder="مثال: 100"
required>



<label>
السعر
</label>

<input
type="number"
step="0.01"
name="price"
placeholder="مثال: 370 شيكل"
required>



<label>
طريقة الدفع
</label>

<input
type="text"
name="payment"
placeholder="مثال: بنك فلسطين"
required>



<button>
نشر الإعلان
</button>


</form>


</div>



</div>


</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إنشاء إعلان</title>
</head>

<body>

<h1>إنشاء إعلان بيع USDT</h1>


<form method="POST">

<label>اسم المستخدم</label>
<br>
<input name="user" required>

<br><br>

<label>كمية USDT</label>
<br>
<input type="number" step="0.01" name="amount" required>

<br><br>

<label>السعر</label>
<br>
<input type="number" step="0.01" name="price" required>

<br><br>

<label>طريقة الدفع</label>
<br>
<input name="payment" required>

<br><br>

<button type="submit">
نشر الإعلان
</button>

</form>


</body>
</html>

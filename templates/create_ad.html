<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إنشاء إعلان بيع USDT</title>


<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}


.box{

    background:white;
    width:90%;
    max-width:500px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px #ccc;

}


h2{

    text-align:center;

}



input,select{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;

}



button{

    width:100%;
    padding:13px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;

}



.back{

    display:block;
    text-align:center;
    margin-top:15px;

}


</style>


</head>



<body>



<div class="box">


<h2>
➕ إنشاء إعلان USDT
</h2>



<form method="POST">



<label>
كمية USDT
</label>


<input 
type="number"
step="0.01"
name="amount"
placeholder="مثال: 100"
required
>



<label>
السعر
</label>


<input

type="number"

step="0.01"

name="price"

placeholder="مثال: 370"

required

>




<label>
طريقة الدفع
</label>


<select name="payment">


<option>
تحويل بنكي
</option>


<option>
نقدي
</option>


<option>
محفظة إلكترونية
</option>


</select>





<button type="submit">

نشر الإعلان

</button>



</form>



<a class="back" href="/">

⬅ الرجوع للرئيسية

</a>



</div>



</body>

</html>

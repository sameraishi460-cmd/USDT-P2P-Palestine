<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إنشاء إعلان</title>

<style>
body{
    font-family:Arial;
    direction:rtl;
    background:#f5f5f5;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
}

button{
    background:#0084ff;
    color:white;
    border:0;
}
</style>

</head>

<body>

<div class="box">

<h2>🇵🇸 إنشاء إعلان USDT</h2>

<form method="POST">

<label>نوع الإعلان</label>

<select name="type">
<option value="SELL">بيع USDT</option>
<option value="BUY">شراء USDT</option>
</select>


<label>الكمية USDT</label>

<input 
type="number" 
name="amount"
placeholder="مثال: 100"
required>


<label>السعر بالشيكل</label>

<input 
type="number" 
name="price"
placeholder="مثال: 300"
required>


<label>طريقة الدفع</label>

<select name="payment">

<option>Reflect</option>

<option>Apple Pay</option>

<option>Google Pay</option>

<option>بنك فلسطين</option>

<option>تحويل بنكي</option>

<option>نقدي</option>

</select>


<button type="submit">
نشر الإعلان
</button>


</form>


</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إنشاء إعلان USDT</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:0;
border-radius:5px;
}

</style>

</head>


<body>


<h1>➕ إنشاء إعلان USDT</h1>


<div class="box">


<form method="POST">


<label>
نوع الإعلان
</label>

<select name="type">

<option value="SELL">
بيع USDT
</option>

<option value="BUY">
شراء USDT
</option>

</select>



<label>
كمية USDT
</label>

<input
type="number"
name="amount"
placeholder="مثال 100"
required>



<label>
السعر بالشيكل
</label>

<input
type="number"
step="0.01"
name="price"
placeholder="مثال 3.65"
required>



<label>
طريقة الدفع
</label>

<input
type="text"
name="payment"
placeholder="بنك فلسطين / كاش / تحويل"
required>



<button>
نشر الإعلان
</button>



</form>


<br>

<a href="/">
العودة للرئيسية
</a>


</div>


</body>

</html>

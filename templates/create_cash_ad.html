<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إضافة إعلان مقابلة</title>


<style>

body{

background:#0b1220;
color:white;
font-family:tahoma;
padding:20px;

}



.container{

max-width:600px;
margin:auto;

}



.box{

background:#1e293b;
padding:25px;
border-radius:18px;

}



h2{

text-align:center;
color:#22c55e;

}



label{

display:block;
margin-top:15px;

}



input,textarea{

width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:0;
background:#111827;
color:white;

}



.note{

background:#064e3b;
padding:15px;
border-radius:10px;
margin:20px 0;

}



button{

width:100%;
padding:14px;
border:0;
border-radius:10px;
background:#16a34a;
color:white;
font-size:18px;
margin-top:20px;

}



a{

color:white;
text-decoration:none;

}



.back{

display:inline-block;
background:#2563eb;
padding:10px 15px;
border-radius:10px;
margin-bottom:20px;

}


</style>


</head>



<body>


<div class="container">


<a class="back" href="/cash_market">
رجوع
</a>



<div class="box">


<h2>
🤝 إعلان مقابلة شخصية
</h2>



<form method="post">



<label>

كمية USDT

</label>


<input 

type="number"

step="0.01"

name="amount"

placeholder="مثال: 500"

required>



<label>

السعر

</label>


<input 

type="number"

step="0.01"

name="price"

placeholder="مثال: 1850 شيكل"

required>





<label>

المدينة

</label>


<input 

name="city"

placeholder="مثال: طولكرم"

required>





<label>

مكان المقابلة

</label>


<input 

name="location"

placeholder="مثال: مول / كافيه / منطقة عامة"

required>





<label>

ملاحظات

</label>


<textarea

name="notes"

rows="4"

placeholder="أي تفاصيل إضافية">

</textarea>





<div class="note">


عمولة المنصة الحالية:

<b>

{{fee}}

</b>


<br>


يتم خصمها حسب سياسة المنصة.

</div>





<button>

نشر الإعلان

</button>




</form>



</div>


</div>


</body>


</html>

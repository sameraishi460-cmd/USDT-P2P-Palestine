<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إنشاء إعلان مقابلة شخصية</title>


<style>

body{
    margin:0;
    font-family:tahoma;
    background:#0b1220;
    color:white;
}


.box{

    width:90%;
    max-width:500px;
    margin:40px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;

}


h2{
    text-align:center;
}


input,textarea,select{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:0;

}


button{

    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;

}


.info{

background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:15px;

}

</style>

</head>


<body>


<div class="box">


<h2>
🤝 نشر إعلان مقابلة شخصية
</h2>


<div class="info">

رسوم رفع الإعلان:

<br>

أسبوع = 2 USDT

<br>

أسبوعين = 6 USDT

<br>

شهر كامل = 15 USDT

</div>



<form method="POST">



<input

name="amount"

placeholder="كمية USDT"

required

>



<input

name="price"

placeholder="السعر بالدولار"

required

>



<input

name="city"

placeholder="المدينة"

required

>



<input

name="location"

placeholder="مكان المقابلة"

required

>



<textarea

name="notes"

placeholder="ملاحظات"

></textarea>




<label>

مدة الإعلان:

</label>


<select name="plan" required>


<option value="week">

أسبوع - 2 USDT

</option>


<option value="two_weeks">

أسبوعين - 6 USDT

</option>


<option value="month">

شهر كامل - 15 USDT

</option>


</select>



<button>

متابعة الدفع

</button>


</form>


</div>


</body>

</html>

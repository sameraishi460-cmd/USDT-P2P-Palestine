<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إنشاء إعلان مقابلة</title>


<style>

body{

font-family:Arial;
background:#f1f3f5;
margin:0;

}



.box{

width:90%;
max-width:500px;
background:white;
margin:40px auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px #ddd;

}



h2{

text-align:center;
color:#2b8a3e;

}



label{

display:block;
margin-top:15px;

}



input,textarea{

width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;

}



button{

width:100%;
padding:13px;
margin-top:20px;
background:#2b8a3e;
color:white;
border:0;
border-radius:10px;
font-size:16px;

}



.note{

background:#e7f5ff;
padding:15px;
border-radius:10px;
margin-top:15px;

}



.back{

display:block;
text-align:center;
margin-top:15px;
text-decoration:none;

}



</style>


</head>



<body>



<div class="box">


<h2>

🤝 إعلان مقابلة USDT

</h2>




<div class="note">

رسوم نشر الإعلان:

<b>

{{fee}} USDT

</b>

<br><br>

سيتم احتساب العمولة على الإعلان.

</div>






<form method="POST">



<label>

كمية USDT

</label>


<input

type="number"

step="0.01"

name="amount"

placeholder="مثال: 500"

required>



<label>

السعر

</label>


<input

type="number"

step="0.01"

name="price"

placeholder="مثال: 500"

required>




<label>

المدينة

</label>


<input

type="text"

name="city"

placeholder="مثال: طولكرم"

required>





<label>

مكان المقابلة

</label>


<input

type="text"

name="location"

placeholder="مثال: مول أو مكان عام"

required>





<label>

ملاحظات إضافية

</label>


<textarea

name="notes"

rows="4"

placeholder="أوقات التواجد أو شروط اللقاء">

</textarea>




<button>

نشر الإعلان

</button>



</form>




<a class="back" href="/cash_market">

⬅ العودة

</a>



</div>



</body>

</html>

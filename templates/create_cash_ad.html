<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نشر إعلان مقابلة شخصية</title>


<style>


body{

margin:0;
padding:20px;
background:#070d18;
color:white;
font-family:tahoma;

}



.box{

max-width:500px;
margin:auto;
background:#111827;
padding:25px;
border-radius:25px;

}



h2{

text-align:center;
color:#22c55e;

}



.info{

background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:20px;

}



input,textarea,select{

width:100%;
padding:13px;
margin:8px 0;
border:0;
border-radius:12px;
background:#334155;
color:white;

}



button{

width:100%;
padding:15px;
border:0;
border-radius:12px;
background:#16a34a;
color:white;
font-size:18px;
cursor:pointer;

}



.back{

display:block;
text-align:center;
margin-top:15px;
padding:12px;
background:#2563eb;
border-radius:12px;
color:white;
text-decoration:none;

}


</style>


</head>



<body>


<div class="box">



<h2>

🤝 نشر إعلان مقابلة شخصية

</h2>




<div class="info">


رسوم نشر الإعلان:

<br><br>

🟢 أسبوع : 2 USDT

<br>

🔵 أسبوعين : 6 USDT

<br>

🟣 شهر كامل : 15 USDT


</div>





<form method="POST">



<input 
name="amount"
placeholder="كمية USDT"
required>



<input 
name="price"
placeholder="السعر بالدولار"
required>



<input 
name="city"
placeholder="المدينة"
required>



<input 
name="location"
placeholder="مكان المقابلة"
required>



<textarea
name="notes"
placeholder="ملاحظات إضافية">
</textarea>





<select name="plan">


<option value="week">

أسبوع - 2 USDT

</option>


<option value="two_weeks">

أسبوعين - 6 USDT

</option>



<option value="month">

شهر كامل - 15 USDT

</option>



</select>





<button>

متابعة الدفع 🚀

</button>



</form>




<a class="back" href="/cash_market">

⬅️ الرجوع لسوق المقابلات

</a>




</div>



</body>


</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إنشاء إعلان مقابلة شخصية</title>


<style>

body{
    margin:0;
    font-family:tahoma;
    background:#0b1220;
    color:white;
}


.box{

    width:90%;
    max-width:500px;
    margin:40px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;

}


h2{
    text-align:center;
}


input,textarea,select{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:0;

}


button{

    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;

}


.info{

background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:15px;

}

.price_box{

background:#0f172a;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;

}

</style>

</head>


<body>


<div class="box">


<h2>
🤝 نشر إعلان مقابلة شخصية
</h2>


<div class="info">

رسوم رفع الإعلان:

<br><br>

🟢 أسبوع = 2 USDT

<br>

🟢 أسبوعين = 6 USDT

<br>

🟢 شهر كامل = 15 USDT

</div>



<form method="POST">



<input
name="amount"
placeholder="كمية USDT للبيع"
required
>


<input
name="price"
placeholder="السعر بالدولار"
required
>


<input
name="city"
placeholder="المدينة"
required
>


<input
name="location"
placeholder="مكان المقابلة"
required
>


<textarea
name="notes"
placeholder="ملاحظات إضافية"
></textarea>



<label>
اختر مدة الإعلان:
</label>


<select name="plan" id="plan" onchange="showFee()" required>


<option value="week" data-fee="2">
أسبوع - 2 USDT
</option>


<option value="two_weeks" data-fee="6">
أسبوعين - 6 USDT
</option>


<option value="month" data-fee="15">
شهر كامل - 15 USDT
</option>


</select>


<div class="price_box">

رسوم الإعلان:
<span id="fee">
2
</span>
USDT

</div>



<input type="hidden" name="fee" id="fee_input" value="2">



<button>

💵 متابعة الدفع

</button>


</form>


</div>



<script>

function showFee(){

let select=document.getElementById("plan");

let fee=select.options[select.selectedIndex].getAttribute("data-fee");

document.getElementById("fee").innerHTML=fee;

document.getElementById("fee_input").value=fee;

}

</script>


</body>

</html>

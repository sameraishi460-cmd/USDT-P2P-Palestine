<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>دخول</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
max-width:400px;
margin:auto;
padding:20px;
border-radius:12px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
}

button{
background:#0084ff;
color:white;
border:0;
}

</style>

</head>

<body>

<div class="box">

<h2>
دخول الحساب
</h2>


<form method="POST">


<input
name="email"
placeholder="البريد الإلكتروني"
required>


<input
name="password"
type="password"
placeholder="كلمة المرور"
required>


<button>
دخول
</button>


</form>


</div>

</body>
</html>

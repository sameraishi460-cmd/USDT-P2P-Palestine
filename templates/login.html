<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#0066ff;
color:white;
border:0;
border-radius:5px;
}

</style>

</head>


<body>

<h1>🔐 تسجيل الدخول</h1>


<div class="box">

<form method="POST">


<input 
type="email"
name="email"
placeholder="الإيميل"
required>


<input
type="password"
name="password"
placeholder="كلمة المرور"
required>


<button>
دخول
</button>


</form>


<br>


<a href="/register">
إنشاء حساب جديد
</a>


</div>


</body>

</html>

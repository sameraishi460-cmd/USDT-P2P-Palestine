<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تسجيل الدخول</title>


<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}


.box{

    background:white;
    width:90%;
    max-width:450px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px #ccc;

}


h2{

    text-align:center;

}



input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;

}



.remember{

    display:flex;
    align-items:center;
    gap:8px;
    margin:10px 0;

}


.remember input{

    width:auto;
    margin:0;

}



button{

    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:0;
    border-radius:10px;
    font-size:16px;

}



a{

    display:block;
    text-align:center;
    margin-top:15px;

}


.telegram{

    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:10px;
    text-decoration:none;

}


</style>


</head>



<body>



<div class="box">


<h2>
🔐 تسجيل الدخول
</h2>



<form method="POST">


<input

name="username"

placeholder="اسم المستخدم"

required

>



<input

type="password"

name="password"

placeholder="كلمة المرور"

required

>



<div class="remember">

<input type="checkbox" name="remember">

<label>
تذكرني لمدة 30 يوم
</label>

</div>



<button>

دخول

</button>



</form>



<a class="telegram" href="/telegram_login">
📲 دخول عبر Telegram
</a>



<a href="/register">

إنشاء حساب جديد

</a>



<a href="/">

العودة للرئيسية

</a>



</div>



</body>

</html>

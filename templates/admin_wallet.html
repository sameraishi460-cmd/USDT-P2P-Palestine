<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>إعدادات المنصة</title>


<style>

body{

background:#0b1220;
color:white;
font-family:tahoma;
padding:20px;

}



.container{

max-width:600px;
margin:auto;

}



.box{

background:#1e293b;
padding:25px;
border-radius:18px;

}



h2{

text-align:center;
color:#22c55e;

}



label{

display:block;
margin-top:15px;

}



input{

width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:0;
background:#111827;
color:white;

}



button{

width:100%;
padding:14px;
background:#16a34a;
border:0;
border-radius:10px;
color:white;
margin-top:20px;
font-size:18px;

}



.info{

background:#064e3b;
padding:15px;
border-radius:12px;
margin-top:20px;
word-break:break-all;

}



a{

color:white;
text-decoration:none;

}



.back{

display:inline-block;
background:#2563eb;
padding:10px 15px;
border-radius:10px;
margin-bottom:20px;

}



</style>


</head>


<body>


<div class="container">


<a class="back" href="/admin">

رجوع للأدمن

</a>




<div class="box">


<h2>

⚙️ إعدادات المنصة

</h2>



<form method="post">



<label>

محفظة المنصة

(BNB Smart Chain BEP20)

</label>



<input

name="wallet"

value="{{setting.wallet if setting else ''}}"

placeholder="0x..."

required>



<label>

الشبكة

</label>


<input

name="network"

value="{{setting.network if setting else 'BNB Smart Chain (BEP20)'}}"

required>




<button>

حفظ المحفظة

</button>


</form>





<div class="info">


المحفظة الحالية:

<br><br>


{{setting.wallet if setting else 'لا يوجد'}}


<br><br>


الشبكة:

<br>

{{setting.network if setting else 'غير محددة'}}



</div>




</div>


</div>


</body>


</html>

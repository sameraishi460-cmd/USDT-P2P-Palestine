<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الصفقة</title>
</head>

<body>

<h1>تفاصيل الصفقة</h1>

<p>
البائع:
{{ trade.seller }}
</p>


<p>
الكمية:
{{ trade.amount }} USDT
</p>


<p>
الحالة:
{{ trade.status }}
</p>


<form action="/upload_payment/{{trade.id}}" method="POST" enctype="multipart/form-data">

<h3>
رفع إثبات الدفع
</h3>

<input type="file" name="proof">

<br><br>

<button>
إرسال
</button>

</form>


<a href="/confirm/{{trade.id}}">
تأكيد الاستلام
</a>


</body>
</html>

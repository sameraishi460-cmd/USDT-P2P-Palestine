<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>صفقة USDT P2P</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f5f5f5;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
}

button{
    background:#0084ff;
    color:white;
    border:0;
    padding:12px;
    width:100%;
    border-radius:8px;
    font-size:16px;
}
</style>

</head>

<body>

<div class="box">

<h2>🇵🇸 USDT P2P</h2>

<p>رقم الصفقة: {{trade.id}}</p>

<p>المشتري: {{trade.buyer}}</p>

<p>البائع: {{trade.seller}}</p>

<p>الكمية: {{trade.amount}} USDT</p>

<p>السعر: {{trade.price}} شيكل</p>

<p>عمولة المنصة: {{trade.fee}} USDT</p>

<p>
الحالة:
<b>{{trade.status}}</b>
</p>


{% if trade.status == "WAITING_PAYMENT" %}

<a href="/paid/{{trade.id}}">
<button>
تم الدفع
</button>
</a>

{% endif %}


</div>

</body>
</html>

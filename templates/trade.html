<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>صفقة USDT</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
max-width:500px;
margin:auto;
}

button{
background:#0084ff;
color:white;
border:0;
padding:12px;
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>🇵🇸 USDT P2P</h2>

<p>رقم الصفقة: {{trade.id}}</p>

<p>المشتري: {{trade.buyer}}</p>

<p>البائع: {{trade.seller}}</p>

<p>الكمية: {{trade.amount}} USDT</p>

<p>السعر: {{trade.price}} شيكل</p>

<h3>
الحالة: {{trade.status}}
</h3>


{% if trade.status != "COMPLETED" %}

<a href="/confirm/{{trade.id}}">
<button>
تأكيد إتمام الصفقة
</button>
</a>

{% endif %}


{% if trade.status == "COMPLETED" %}

<h2>
✅ الصفقة مكتملة
</h2>

{% endif %}


</div>

</body>
</html>

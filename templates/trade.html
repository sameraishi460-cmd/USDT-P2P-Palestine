<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
تفاصيل الصفقة
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<div class="container">


<div class="header">

<h2>
🤝 تفاصيل الصفقة
</h2>

</div>



<div class="card">


<p>
👤 المشتري:
{{trade.buyer}}
</p>


<p>
👤 البائع:
{{trade.seller}}
</p>


<p>
💰 الكمية:
{{trade.amount}} USDT
</p>


<p class="price">
💵 السعر:
{{trade.price}}
</p>


<p>
📌 الحالة:
{{trade.status}}
</p>



</div>



<div class="card">


<h3>
📤 رفع إثبات الدفع
</h3>


<form action="/upload_payment/{{trade.id}}" method="POST" enctype="multipart/form-data">


<input 
type="file"
name="proof"
required>


<button>
إرسال الإثبات
</button>


</form>


</div>



<div class="card">


<a href="/confirm/{{trade.id}}">

<button>
✅ تأكيد استلام USDT
</button>

</a>


</div>



</div>


</body>

</html>
